/* ═══════════════════════════════════════════════
   CHAT WIDGET
═══════════════════════════════════════════════ */
function ChatWidget() {
  const { state, dispatch } = useContext(AppContext);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const messagesEndRef = useRef();
  const nav = (p,d) => { dispatch({ type:'SET_PAGE', page:p, data:d }); window.scrollTo(0,0); };

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior:'smooth' });
  }, [state.chatMessages, typing]);

  function sendMessage(text) {
    const msg = text || input.trim();
    if (!msg) return;
    setInput('');
    dispatch({ type:'ADD_CHAT_MSG', msg:{ from:'user', text:msg, type:'TEXT' } });

    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      const lower = msg.toLowerCase();
      const rule = CHATBOT_RULES.find(r => r.keywords.some(k => lower.includes(k)));
      const products = rule?.products?.map(id => PRODUCTS.find(p => p.id === id)).filter(Boolean) || [];
      dispatch({ type:'ADD_CHAT_MSG', msg:{
        from:'bot',
        text: rule ? rule.response : DEFAULT_BOT_RESPONSE,
        type: products.length ? 'PRODUCT_LIST' : 'TEXT',
        products
      }});
    }, 800 + Math.random() * 400);
  }

  const suggestions = ['💻 Laptop gaming','🎧 Tai nghe Sony','⌨️ Bàn phím cơ','📦 Đơn hàng của tôi','💳 Cách thanh toán'];

  return (
    <div id="chat-widget">
      {state.chatOpen && (
        <div className="chat-box">
          <div className="chat-header">
            <div className="chat-header-avatar">🤖</div>
            <div className="chat-header-info">
              <div className="chat-header-name">TechBot AI</div>
              <div className="chat-header-status"><span style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',display:'inline-block'}}/>Đang hoạt động</div>
            </div>
            <button className="btn btn-icon btn-ghost btn-sm" onClick={() => dispatch({ type:'TOGGLE_CHAT' })}>×</button>
          </div>

          <div className="chat-tabs">
            {[['bot','🤖 TechBot'],['live','💬 Live Chat']].map(([t,l]) => (
              <div key={t} className={`chat-tab${state.chatTab===t?' active':''}`} onClick={() => dispatch({ type:'SET_CHAT_TAB', tab:t })}>{l}</div>
            ))}
          </div>

          {state.chatTab === 'bot' ? (
            <>
              <div className="chat-messages">
                {state.chatMessages.map((msg,i) => (
                  <div key={i} className={`msg ${msg.from}`}>
                    {msg.from === 'bot' && <div className="msg-avatar">🤖</div>}
                    <div>
                      <div className="msg-bubble">{msg.text}</div>
                      {msg.type === 'PRODUCT_LIST' && msg.products?.length > 0 && (
                        <div className="msg-products" style={{marginTop:8}}>
                          {msg.products.map(p => (
                            <div key={p.id} className="msg-product-card" onClick={() => nav('product',{productId:p.id})}>
                              <span className="msg-product-icon">{p.emoji}</span>
                              <div className="msg-product-info">
                                <div className="name">{p.name}</div>
                                <div className="price">{formatPrice(p.price)}</div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                    {msg.from === 'user' && <div className="msg-avatar" style={{background:'linear-gradient(135deg,var(--accent),#0099cc)'}}>{state.user?.[0]||'U'}</div>}
                  </div>
                ))}
                {typing && (
                  <div className="msg bot">
                    <div className="msg-avatar">🤖</div>
                    <div className="typing">
                      <div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/>
                    </div>
                  </div>
                )}
                <div ref={messagesEndRef}/>
              </div>

              <div className="chat-suggestions">
                {suggestions.map(s => <div key={s} className="chat-suggestion" onClick={() => sendMessage(s)}>{s}</div>)}
              </div>

              <div className="chat-input-area">
                <input className="chat-input" placeholder="Hỏi TechBot..." value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && sendMessage()}/>
                <button className="chat-send" onClick={() => sendMessage()}>→</button>
              </div>
            </>
          ) : (
            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,textAlign:'center'}}>
              <div style={{fontSize:48,marginBottom:14}}>💬</div>
              <div style={{fontFamily:'var(--font-head)',fontSize:16,fontWeight:700,marginBottom:8}}>Chat trực tiếp</div>
              <div style={{fontSize:13,color:'var(--muted)',marginBottom:20}}>Kết nối với nhân viên hỗ trợ của chúng tôi trong giờ làm việc (8:00–22:00)</div>
              <button className="btn btn-primary" onClick={() => { if(!state.user) { dispatch({ type:'SET_PAGE', page:'login' }); dispatch({ type:'TOGGLE_CHAT' }); } }}>
                {state.user ? '🔗 Bắt đầu chat' : '🔑 Đăng nhập để chat'}
              </button>
            </div>
          )}
        </div>
      )}

      <button className="chat-toggle" onClick={() => dispatch({ type:'TOGGLE_CHAT' })}>
        {state.chatOpen ? '✕' : '💬'}
        {!state.chatOpen && <span className="chat-unread">1</span>}
      </button>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   APP ROUTER
═══════════════════════════════════════════════ */
function Router() {
  const { state } = useContext(AppContext);
  switch (state.page) {
    case 'home': return <HomePage/>;
    case 'products': return <ProductsPage/>;
    case 'product': return <ProductDetailPage/>;
    case 'cart': return <CartPage/>;
    case 'checkout': return <CheckoutPage/>;
    case 'order-success': return <OrderSuccessPage/>;
    case 'orders': return <OrdersPage/>;
    case 'login': return <AuthPage/>;
    case 'admin': return <AdminDashboard/>;
    case 'about': return <AboutPage/>;
    case 'profile': return <ProfilePage/>;
    default: return <HomePage/>;
  }
}

/* ═══════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════ */
function App() {
  const [state, dispatch] = useReducer(reducer, initialState);

  return (
    <AppContext.Provider value={{ state, dispatch }}>
      <Navbar/>
      <Router/>
      <ChatWidget/>
      <ToastContainer/>
    </AppContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App/>);
